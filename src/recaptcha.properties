# Google reCAPTCHA v2 ("I'm not a robot") configuration for AltoroJ.
#
# The values below are Google's OFFICIAL TEST KEYS. They always pass verification
# and cause the widget to show a "This reCAPTCHA is for testing purposes only"
# banner. This lets the application run out of the box with no setup.
#
# To use real reCAPTCHA protection, register a site at
#   https://www.google.com/recaptcha/admin
# choose reCAPTCHA v2 -> "I'm not a robot" Checkbox, add your domain, and replace
# both values below with the generated Site key and Secret key. Then rebuild the war.
#
# NOTE: never commit a real Secret key to a public repository.

recaptcha.siteKey=6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
recaptcha.secretKey=6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe

# Embedded Derby database name. Change this to run a second copy of this app on the
# SAME Tomcat without a database-lock conflict (each instance needs its own DB name).
# Example: a real-key demo instance uses altoro_recaptcha, and a test-key instance for
# AppScan/DAST uses altoro_recaptcha_scan.
db.name=altoro_recaptcha
